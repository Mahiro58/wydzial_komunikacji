spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate

# Usługa zewnętrzna
_service.name=vpic.nhtsa.dot.gov
_service.port=443
_service.api_path=/api/vehicles/decodevinvalues/%s?format=json
