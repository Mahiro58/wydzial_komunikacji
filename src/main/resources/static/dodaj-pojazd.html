<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Dodaj pojazd</title>
</head>
<body>

<h1>Dodaj pojazd</h1>

<form onsubmit="dodajPojazd(event)">
    <label>Marka:</label><br>
    <input id="marka" required><br><br>

    <label>Model:</label><br>
    <input id="model" required><br><br>

    <label>Rok:</label><br>
    <input id="rok" type="number" min="1900" max="3000"><br><br>

    <label>VIN:</label><br>
    <input id="vin" maxlength="17" required><br><br>

    <label>Numer rejestracyjny:</label><br>
    <input id="numerRejestracyjny"><br><br>

    <button type="submit">Zapisz pojazd</button>
</form>

<p id="msg"></p>

<br>
<a href="/user-panel.html">Powrót do panelu</a>

<script>
    if (!localStorage.getItem("email")) {
        window.location.href = "/login.html";
    }

    async function dodajPojazd(event) {
        event.preventDefault();

        const data = {
            marka: document.getElementById("marka").value,
            model: document.getElementById("model").value,
            rok: document.getElementById("rok").value,
            vin: document.getElementById("vin").value,
            numerRejestracyjny: document.getElementById("numerRejestracyjny").value
        };

        const response = await fetch("/pojazd", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            const saved = await response.json();
            document.getElementById("msg").innerText =
                "Dodano pojazd ID: " + saved.id + ", VIN: " + saved.vin;
        } else {
            const error = await response.text();
            document.getElementById("msg").innerText =
                "Błąd dodawania pojazdu: " + error;
        }
    }
</script>

</body>
</html>
