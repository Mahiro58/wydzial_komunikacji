<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel administratora</title>
</head>
<body>

<h1>Panel administratora systemu</h1>

<p>Zalogowany jako: <strong id="email"></strong></p>

<hr>

<h2>Zarządzanie systemem</h2>

<button onclick="location.href='/zarzadzanie-uzytkownikami.html'">
    Zarządzanie użytkownikami i rolami
</button>

<button onclick="location.href='/urzednik-panel.html'">
    Panel urzędnika
</button>

<button onclick="location.href='/bezpieczenstwo.html'">
    Bezpieczeństwo systemu
</button>

<hr>

<button onclick="logout()">Wyloguj</button>

<script>
    const rola = localStorage.getItem("rola");
    const email = localStorage.getItem("email");

    if (rola !== "ADMIN") {
        alert("Brak dostępu do panelu administratora");
        window.location.href = "/index.html";
    }

    document.getElementById("email").innerText = email ?? "";

    function logout() {
        localStorage.clear();
        window.location.href = "/login.html";
    }
</script>

</body>
</html>
