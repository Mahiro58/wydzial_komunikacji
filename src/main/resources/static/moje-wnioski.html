<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Moje wnioski</title>
</head>
<body>

<h1>Moje wnioski</h1>

<div id="powiadomienie"
     style="border:1px solid #999; padding:10px; margin:10px 0;">
    Brak nowych powiadomień
</div>

<button onclick="pobierzWnioski()">
    Odśwież
</button>

<br><br>

<table border="1" cellpadding="8">
    <thead>
    <tr>
        <th>ID</th>
        <th>Typ</th>
        <th>Status</th>
        <th>Data złożenia</th>
        <th>Opis</th>
        <th>Akcja</th>
    </tr>
    </thead>

    <tbody id="tabela"></tbody>
</table>

<br>
<a href="/user-panel.html">
    Powrót do panelu
</a>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    const userId = localStorage.getItem("userId");

    if (!userId) {
        window.location.href = "/login.html";
    }

    async function pobierzWnioski() {

        const response =
            await fetch("/wniosek/uzytkownik/" + userId);

        if (!response.ok) {
            alert("Nie udało się pobrać wniosków");
            return;
        }

        const wnioski = await response.json();

        const tabela =
            document.getElementById("tabela");

        tabela.innerHTML = "";

        wnioski.forEach(w => {

            const row =
                document.createElement("tr");

            row.innerHTML = `
                <td>${w.id}</td>

                <td>${w.typ}</td>

                <td>
                    ${w.status}
                    ${
                        w.status === "DO_POPRAWY"
                        ? "<br><strong style='color:red'>Wymaga poprawy</strong>"
                        : ""
                    }
                </td>

                <td>${w.dataZlozenia ?? "-"}</td>

                <td>${w.opis ?? ""}</td>

                <td>
                    ${
                        w.status === "DO_POPRAWY"
                        ? `
                            <button
                                onclick="przejdzDoPoprawy(${w.id})">
                                Popraw
                            </button>
                          `
                        : "-"
                    }
                </td>
            `;

            tabela.appendChild(row);
        });
    }

    function przejdzDoPoprawy(id) {
        window.location.href =
            "/popraw-wniosek.html?id=" + id;
    }

    function polaczWebSocket() {

        const socket =
            new SockJS("/my-websocket");

        const stompClient =
            Stomp.over(socket);

        stompClient.connect({}, function () {

            console.log("Połączono z WebSocket");

            stompClient.subscribe(
                "/topic/wniosek/events",
                function (message) {

                    const event =
                        JSON.parse(message.body);

                    document.getElementById(
                        "powiadomienie"
                    ).innerText =
                        "🔔 Zmieniono status wniosku ID "
                        + event.wniosekId
                        + " z "
                        + event.oldStatus
                        + " na "
                        + event.newStatus;

                    pobierzWnioski();
                }
            );
        });
    }

    pobierzWnioski();
    polaczWebSocket();
</script>

</body>
</html>
