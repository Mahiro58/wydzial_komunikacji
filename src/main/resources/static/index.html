<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Wydział Komunikacji</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #eef3f8;
        }

        header {
            background: #0057b8;
            color: white;
            padding: 25px;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 0 12px rgba(0,0,0,0.15);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        .buttons {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        a {
            text-decoration: none;
            background: #0078ff;
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: bold;
        }

        a:hover {
            opacity: 0.9;
        }

        .secondary {
            background: #555;
        }

        .panel {
            background: #198754;
        }
    </style>
</head>
<body>

<header>
    <h1>System Wydziału Komunikacji</h1>
    <p>Rejestracja pojazdów i obsługa wniosków online</p>
</header>

<div class="container">
    <h2>Witaj w aplikacji</h2>

    <p>
        Za pomocą systemu możesz zarejestrować konto,
        zalogować się oraz obsługiwać wnioski związane z pojazdami.
    </p>

    <div class="buttons">
        <a href="/login.html">Logowanie</a>
        <a href="/register.html">Rejestracja</a>
        <a href="/user-panel.html" class="panel">Panel użytkownika</a>
        <a href="/admin-panel.html" class="secondary">Panel urzędnika</a>
    </div>
</div>

</body>
</html>
