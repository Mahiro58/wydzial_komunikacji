<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zarządzanie użytkownikami</title>
</head>
<body>

<h1>Zarządzanie użytkownikami i rolami</h1>

<label>Filtruj użytkowników:</label><br>
<input
        type="text"
        id="filtr"
        placeholder="np. Kowalski, admin, USER..."
        oninput="filtrujUzytkownikow()"
>

<br><br>

<button onclick="pobierzUzytkownikow()">Odśwież</button>

<br><br>

<table border="1" cellpadding="8">
    <thead>
    <tr>
        <th>ID</th>
        <th>Imię</th>
        <th>Nazwisko</th>
        <th>Email</th>
        <th>Telefon</th>
        <th>Rola</th>
        <th>Akcja</th>
    </tr>
    </thead>
    <tbody id="tabela"></tbody>
</table>

<p id="msg"></p>

<br>
<a href="/admin-panel.html">Powrót do panelu admina</a>

<script>
    const rola = localStorage.getItem("rola");
    let wszyscyUzytkownicy = [];

    if (rola !== "ADMIN") {
        alert("Brak dostępu");
        window.location.href = "/index.html";
    }

    async function pobierzUzytkownikow() {
        const response = await fetch("/uzytkownik");
        wszyscyUzytkownicy = await response.json();

        renderujTabele(wszyscyUzytkownicy);
    }

    function renderujTabele(users) {
        const tabela = document.getElementById("tabela");
        tabela.innerHTML = "";

        users.forEach(u => {
            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${u.id}</td>
                <td>${u.imie ?? ""}</td>
                <td>${u.nazwisko ?? ""}</td>
                <td>${u.email ?? ""}</td>
                <td>${u.telefon ?? ""}</td>
                <td>
                    <select id="rola-${u.id}">
                        <option value="USER">USER</option>
                        <option value="URZEDNIK">URZEDNIK</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </td>
                <td>
                    <button onclick="zmienRole(${u.id})">
                        Zapisz rolę
                    </button>
                </td>
            `;

            tabela.appendChild(row);
            document.getElementById(`rola-${u.id}`).value = u.rola;
        });
    }

    function filtrujUzytkownikow() {
        const filtr = document.getElementById("filtr")
            .value
            .toLowerCase()
            .trim();

        const przefiltrowani = wszyscyUzytkownicy.filter(u => {
            return (
                String(u.id).includes(filtr)
                || (u.imie ?? "").toLowerCase().includes(filtr)
                || (u.nazwisko ?? "").toLowerCase().includes(filtr)
                || (u.email ?? "").toLowerCase().includes(filtr)
                || (u.telefon ?? "").toLowerCase().includes(filtr)
                || (u.rola ?? "").toLowerCase().includes(filtr)
            );
        });

        renderujTabele(przefiltrowani);
    }

    async function zmienRole(id) {
        const nowaRola = document.getElementById(`rola-${id}`).value;

        const response = await fetch(`/uzytkownik/${id}/rola?rola=${nowaRola}`, {
            method: "PATCH"
        });

        if (response.ok) {
            document.getElementById("msg").innerText = "Rola została zmieniona.";
            await pobierzUzytkownikow();
            filtrujUzytkownikow();
        } else {
            const error = await response.text();
            document.getElementById("msg").innerText = "Błąd zmiany roli: " + error;
        }
    }

    pobierzUzytkownikow();
</script>

</body>
</html>
