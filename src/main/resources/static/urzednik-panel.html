<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel urzędnika</title>
</head>
<body>

<h1>Panel urzędnika</h1>

<button onclick="pobierzWnioski()">
    Odśwież listę
</button>

<table border="1" cellpadding="8">
    <thead>
    <tr>
        <th>ID</th>
        <th>Typ</th>
        <th>Status</th>
        <th>Użytkownik</th>
        <th>Pojazd</th>
        <th>Akcja</th>
    </tr>
    </thead>

    <tbody id="tabela"></tbody>
</table>

<script>
    const rola = localStorage.getItem("rola");

    if (rola !== "URZEDNIK" && rola !== "ADMIN") {
        alert("Brak dostępu do panelu urzędnika");
        window.location.href = "/index.html";
    }
    
    async function pobierzWnioski() {

        const response = await fetch("/wniosek");

        const wnioski = await response.json();

        const tabela = document.getElementById("tabela");

        tabela.innerHTML = "";

        wnioski.forEach(w => {

            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${w.id}</td>
                <td>${w.typ}</td>
                <td>${w.status}</td>
                <td>${w.uzytkownik?.email ?? "-"}</td>
                <td>${w.pojazd?.marka ?? "-"} ${w.pojazd?.model ?? ""}</td>

                <td>
                    <select id="status-${w.id}">
                        <option value="ZLOZONY">ZŁOŻONY</option>
                        <option value="W_TRAKCIE">W TRAKCIE</option>
                        <option value="DO_POPRAWY">DO POPRAWY</option>
                        <option value="ZATWIERDZONY">ZATWIERDZONY</option>
                        <option value="ODRZUCONY">ODRZUCONY</option>
                    </select>

                    <button onclick="zmienStatus(${w.id})">
                        Zapisz
                    </button>
                </td>
            `;

            tabela.appendChild(row);

            document.getElementById(`status-${w.id}`).value = w.status;
        });
    }

    async function zmienStatus(id) {

        const status =
            document.getElementById(`status-${id}`).value;

        const response = await fetch(
            `/wniosek/${id}/status?status=${status}`,
            {
                method: "PATCH"
            }
        );

        if (response.ok) {
            alert("Status zmieniony");
            pobierzWnioski();
        } else {
            alert("Błąd zmiany statusu");
        }
    }

    pobierzWnioski();
</script>

</body>
</html>
