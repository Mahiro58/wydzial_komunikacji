<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel użytkownika</title>
</head>
<body>

<h1>Panel użytkownika</h1>

<p>Zalogowany jako: <strong id="email"></strong></p>
<p>Rola: <strong id="rola"></strong></p>

<hr>

<h2>Moje sprawy</h2>

<button onclick="location.href='/profil.html'">Profil użytkownika</button>
<button onclick="location.href='/moje-pojazdy.html'">Moje pojazdy</button>
<button onclick="location.href='/nowy-wniosek.html'">Złóż wniosek</button>
<button onclick="location.href='/moje-wnioski.html'">Moje wnioski</button>


<hr>

<button onclick="logout()">Wyloguj</button>

<script>
    const email = localStorage.getItem("email");
    const rola = localStorage.getItem("rola");

    if (!email) {
        window.location.href = "/login.html";
    }

    document.getElementById("email").innerText = email;
    document.getElementById("rola").innerText = rola;

    function logout() {
        localStorage.clear();
        window.location.href = "/login.html";
    }
</script>

</body>
</html>
