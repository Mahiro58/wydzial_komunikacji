<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Nadzór płatności</title>
</head>
<body>

<h1>Nadzór płatności</h1>

<p>Zalogowany jako administrator</p>

<label>Filtruj płatności:</label><br>
<input
        type="text"
        id="filtr"
        placeholder="np. Kowalski, REJESTRACJA, opłacone..."
        oninput="filtrujPlatnosci()"
>

<br><br>

<button onclick="pobierzWnioski()">Odśwież</button>

<br><br>

<table border="1" cellpadding="8">
    <thead>
    <tr>
        <th>ID wniosku</th>
        <th>Typ</th>
        <th>Status</th>
        <th>Użytkownik</th>
        <th>Kwota</th>
        <th>Opłacono</th>
        <th>Akcja</th>
    </tr>
    </thead>

    <tbody id="tabela"></tbody>
</table>

<p id="msg"></p>

<br>
<a href="/admin-panel.html">Powrót do panelu admina</a>

<script>
    const rola = localStorage.getItem("rola");

    if (rola !== "ADMIN") {
        alert("Brak dostępu do nadzoru płatności");
        window.location.href = "/index.html";
    }

    let wszystkieWnioski = [];

    async function pobierzWnioski() {
        const response = await fetch("/wniosek");

        if (!response.ok) {
            document.getElementById("msg").innerText =
                "Nie udało się pobrać wniosków.";
            return;
        }

        wszystkieWnioski = await response.json();

        renderujTabele(wszystkieWnioski);
    }

    function renderujTabele(wnioski) {
        const tabela = document.getElementById("tabela");
        tabela.innerHTML = "";

        wnioski.forEach(w => {
            const row = document.createElement("tr");

            const email = w.uzytkownik?.email ?? "-";
            const kwota = w.kwotaOplaty ?? 0;
            const oplacono = w.oplacono === true;

            row.innerHTML = `
                <td>${w.id}</td>
                <td>${w.typ}</td>
                <td>${w.status}</td>
                <td>${email}</td>
                <td>${kwota} zł</td>
                <td>
                    <select id="oplacono-${w.id}">
                        <option value="true">TAK</option>
                        <option value="false">NIE</option>
                    </select>
                </td>
                <td>
                    <button onclick="zmienPlatnosc(${w.id})">
                        Zapisz
                    </button>
                </td>
            `;

            tabela.appendChild(row);

            document.getElementById(`oplacono-${w.id}`).value =
                oplacono ? "true" : "false";
        });
    }

    function filtrujPlatnosci() {
        const filtr = document.getElementById("filtr")
            .value
            .toLowerCase()
            .trim();

        const przefiltrowane = wszystkieWnioski.filter(w => {
            const email = w.uzytkownik?.email ?? "";
            const imie = w.uzytkownik?.imie ?? "";
            const nazwisko = w.uzytkownik?.nazwisko ?? "";
            const kwota = String(w.kwotaOplaty ?? 0);
            const oplaconoText = w.oplacono ? "opłacone tak" : "nieopłacone nie";

            return (
                String(w.id).includes(filtr)
                || (w.typ ?? "").toLowerCase().includes(filtr)
                || (w.status ?? "").toLowerCase().includes(filtr)
                || email.toLowerCase().includes(filtr)
                || imie.toLowerCase().includes(filtr)
                || nazwisko.toLowerCase().includes(filtr)
                || kwota.includes(filtr)
                || oplaconoText.toLowerCase().includes(filtr)
            );
        });

        renderujTabele(przefiltrowane);
    }

    async function zmienPlatnosc(id) {
        const value = document.getElementById(`oplacono-${id}`).value;

        const response = await fetch(
            `/wniosek/${id}/oplacono?oplacono=${value}`,
            {
                method: "PATCH"
            }
        );

        if (response.ok) {
            document.getElementById("msg").innerText =
                "Status płatności został zmieniony.";

            await pobierzWnioski();
            filtrujPlatnosci();

        } else {
            const error = await response.text();

            document.getElementById("msg").innerText =
                "Błąd zmiany płatności: " + error;
        }
    }

    pobierzWnioski();
</script>

</body>
</html>
